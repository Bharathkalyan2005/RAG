services:
  - type: web
    name: enterprise-rag-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
    disk:
      name: vector-db
      mountPath: /app/vector_db
      sizeGB: 1
